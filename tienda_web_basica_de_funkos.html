<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Funko</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    header { background: #111; color: white; padding: 15px; text-align: center; }
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    .product { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .product img { width: 100%; border-radius: 10px; }
    .price { font-size: 18px; color: green; margin: 10px 0; }
    button { background: black; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    button:hover { background: #333; }
  </style>
</head>
<body>

<header>
  <h1>🔥 Tienda de Funkos</h1>
  <p>Los mejores precios en figuras Funko Pop</p>
</header>

<div class="container">
  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Funko 1">
    <h3>Funko Naruto</h3>
    <p class="price">12€</p>
    <button>Comprar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Funko 2">
    <h3>Funko Spider-Man</h3>
    <p class="price">15€</p>
    <button>Comprar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Funko 3">
    <h3>Funko Goku</h3>
    <p class="price">14€</p>
    <button>Comprar</button>
  </div>
</div>

</body>
</html>
